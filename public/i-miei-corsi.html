<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>I miei corsi — GrecoLatinoVivo</title>
<style>
  :root { --bordeaux:#a01a36; --gold:#c9a84c; }
  * { box-sizing:border-box; margin:0; padding:0; }
  body { font-family:'Inter',-apple-system,system-ui,sans-serif; background:#0d0d0d; color:#f5f5f5; min-height:100vh; }
  .topbar { display:flex; align-items:center; justify-content:space-between; padding:18px 28px; border-bottom:1px solid rgba(255,255,255,.08); }
  .brand { font-family:'Cormorant Garamond',serif; font-size:22px; color:#fff; text-decoration:none; }
  .brand small { display:block; font-size:11px; color:rgba(245,245,245,.55); letter-spacing:.05em; }
  .back { color:var(--gold); text-decoration:none; font-size:13px; }
  .wrap { max-width:820px; margin:0 auto; padding:40px 24px; }
  h1 { font-family:'Cormorant Garamond',serif; font-size:34px; color:#fff; margin-bottom:6px; }
  .sub { color:rgba(245,245,245,.6); margin-bottom:30px; font-size:14px; }
  .row { display:flex; align-items:center; gap:18px; background:#161616; border:1px solid rgba(255,255,255,.09); border-radius:12px; padding:18px 20px; margin-bottom:12px; }
  .row-main { flex:1; min-width:0; }
  .row-title { font-size:16px; color:#fff; margin-bottom:3px; }
  .row-meta { font-size:12.5px; color:rgba(245,245,245,.5); margin-bottom:10px; }
  .bar { height:7px; background:rgba(255,255,255,.1); border-radius:5px; overflow:hidden; }
  .bar-fill { height:100%; background:var(--gold); border-radius:5px; transition:width .4s; }
  .pct { font-size:12px; color:var(--gold); margin-top:6px; font-weight:600; }
  .done-badge { font-size:12px; color:#86efac; font-weight:600; margin-top:6px; }
  .btn { border:none; border-radius:8px; padding:11px 20px; font-size:13px; font-weight:700; cursor:pointer; background:var(--bordeaux); color:#fff; text-decoration:none; white-space:nowrap; }
  .empty,.err { text-align:center; padding:70px 20px; color:rgba(245,245,245,.5); }
  .empty a { color:var(--gold); }
</style>
</head>
<body>
  <div class="topbar">
    <a href="/dashboard.html" class="brand">GrecoLatinoVivo<small>I miei corsi</small></a>
    <a href="/dashboard.html" class="back">← Torna al portale</a>
  </div>
  <div class="wrap">
    <h1>I miei corsi</h1>
    <p class="sub">I corsi che hai iniziato e il punto a cui sei arrivato.</p>
    <div id="list"><div class="empty">Caricamento…</div></div>
  </div>

<script>
function esc(s){return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

async function init() {
  const me = await fetch('/api/auth/me', { credentials:'include' });
  if (!me.ok) { location.href = '/index.html'; return; }

  const list = document.getElementById('list');
  try {
    const r = await fetch('/api/progress/my-courses');
    if (!r.ok) { list.innerHTML = '<div class="err">Errore nel caricamento.</div>'; return; }
    const { courses } = await r.json();
    if (!courses || !courses.length) {
      list.innerHTML = '<div class="empty">Non hai ancora iniziato nessun corso.<br><br><a href="/dashboard.html#section-brevi">Esplora il catalogo →</a></div>';
      return;
    }
    list.innerHTML = '';
    courses.forEach(c => {
      const done = c.percent >= 100;
      const row = document.createElement('div');
      row.className = 'row';
      row.innerHTML =
        '<div class="row-main">' +
          '<div class="row-title">' + esc(c.title) + '</div>' +
          '<div class="row-meta">' + esc(c.lang || '') +
            ' · ' + c.completedLessons + '/' + c.totalLessons + ' lezioni' +
            (done ? '' : ' · ultima: ' + esc(c.lastLessonTitle || '')) + '</div>' +
          '<div class="bar"><div class="bar-fill" style="width:' + c.percent + '%;' + (done ? 'background:#34d399;' : '') + '"></div></div>' +
          (done ? '<div class="done-badge">✓ Completato</div>' : '<div class="pct">' + c.percent + '%</div>') +
        '</div>' +
        '<a class="btn" href="/dashboard.html?corso=' + encodeURIComponent(c.slug) +
          (done ? '' : '&lezione=' + encodeURIComponent(c.lastLessonId)) + '">' +
          (done ? 'Rivedi' : 'Riprendi') + '</a>';
      list.appendChild(row);
    });
  } catch (e) {
    list.innerHTML = '<div class="err">Errore di rete.</div>';
  }
}
init();
</script>
</body>
</html>
