<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Imposta la tua password — GrecoLatinoVivo</title>
  <!-- Blocca indicizzazione: pagina funzionale, non da mostrare nei motori di ricerca -->
  <meta name="robots" content="noindex, nofollow">
  <link rel="icon" href="/favicon.ico">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #0a0a0a;
      --surface:  #141414;
      --border:   #2a2a2a;
      --text:     #f5f5f5;
      --muted:    rgba(245,245,245,.55);
      --rosso:    #a01a36;
      --gold:     #c9962a;
      --gold-lt:  #e8c875;
      --font:     'Inter', system-ui, sans-serif;
      --radius:   6px;
    }

    body {
      font-family: var(--font);
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px 16px;
    }

    /* ── Logo ── */
    .logo {
      display: flex;
      flex-direction: column;
      align-items: center;
      margin-bottom: 40px;
      text-decoration: none;
    }
    .logo__mark {
      font-size: 22px;
      font-weight: 700;
      letter-spacing: 2px;
      color: var(--gold);
      text-transform: uppercase;
    }
    .logo__sub {
      font-size: 11px;
      letter-spacing: 1.5px;
      color: var(--muted);
      text-transform: uppercase;
      margin-top: 4px;
    }

    /* ── Card ── */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 40px 36px;
      width: 100%;
      max-width: 420px;
    }

    .card__title {
      font-size: 20px;
      font-weight: 700;
      margin-bottom: 8px;
      line-height: 1.3;
    }

    .card__desc {
      font-size: 14px;
      color: var(--muted);
      line-height: 1.6;
      margin-bottom: 28px;
    }

    /* ── Form ── */
    .field {
      margin-bottom: 16px;
    }

    label {
      display: block;
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 1px;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 6px;
    }

    .input-wrap {
      position: relative;
    }

    input[type="password"],
    input[type="text"],
    input[type="email"] {
      display: block;
      width: 100%;
      padding: 12px 44px 12px 14px;
      background: #1e1e1e;
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      color: var(--text);
      font-family: var(--font);
      font-size: 15px;
      transition: border-color .2s;
      outline: none;
    }

    input:focus {
      border-color: var(--gold);
    }

    .toggle-pw {
      position: absolute;
      right: 12px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      cursor: pointer;
      color: var(--muted);
      font-size: 17px;
      padding: 0;
      line-height: 1;
    }

    .toggle-pw:focus-visible {
      outline: 2px solid var(--gold);
      outline-offset: 2px;
      border-radius: 3px;
    }

    /* ── Password strength meter ── */
    .strength-bar {
      height: 3px;
      border-radius: 2px;
      background: var(--border);
      margin-top: 6px;
      overflow: hidden;
    }

    .strength-bar__fill {
      height: 100%;
      width: 0%;
      border-radius: 2px;
      transition: width .3s, background-color .3s;
    }

    .strength-label {
      font-size: 11px;
      color: var(--muted);
      margin-top: 4px;
      min-height: 16px;
    }

    /* ── Submit ── */
    .btn-submit {
      display: block;
      width: 100%;
      padding: 14px;
      background: var(--rosso);
      color: #fff;
      border: none;
      border-radius: var(--radius);
      font-family: var(--font);
      font-weight: 700;
      font-size: 13px;
      letter-spacing: 1px;
      text-transform: uppercase;
      cursor: pointer;
      margin-top: 8px;
      transition: opacity .2s;
    }

    .btn-submit:hover { opacity: .88; }
    .btn-submit:disabled { opacity: .45; cursor: not-allowed; }

    .btn-submit:focus-visible {
      outline: 2px solid var(--gold);
      outline-offset: 3px;
    }

    /* ── Error / success messages ── */
    .msg {
      font-size: 13px;
      line-height: 1.5;
      border-radius: var(--radius);
      padding: 10px 14px;
      margin-top: 14px;
      display: none;
    }

    .msg--error {
      background: rgba(160, 26, 54, .15);
      border: 1px solid rgba(160, 26, 54, .4);
      color: #f5a0ae;
    }

    .msg--success {
      background: rgba(50, 160, 80, .15);
      border: 1px solid rgba(50, 160, 80, .4);
      color: #90eaa5;
    }

    /* ── Footer links ── */
    .foot {
      margin-top: 24px;
      font-size: 12px;
      color: var(--muted);
      text-align: center;
      line-height: 1.7;
    }

    .foot a {
      color: var(--gold);
      text-decoration: none;
    }

    .foot a:hover { text-decoration: underline; }

    .foot a:focus-visible {
      outline: 2px solid var(--gold);
      outline-offset: 2px;
      border-radius: 2px;
    }

    /* ── Resend section ── */
    .resend-section {
      margin-top: 32px;
      padding-top: 24px;
      border-top: 1px solid var(--border);
    }

    .resend-section__title {
      font-size: 13px;
      color: var(--muted);
      margin-bottom: 10px;
    }

    .resend-row {
      display: flex;
      gap: 8px;
    }

    .resend-row input[type="email"] {
      flex: 1;
      padding: 10px 12px;
    }

    .btn-resend {
      padding: 10px 16px;
      background: transparent;
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      color: var(--text);
      font-family: var(--font);
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      white-space: nowrap;
      transition: border-color .2s;
    }

    .btn-resend:hover { border-color: var(--gold); }
    .btn-resend:disabled { opacity: .45; cursor: not-allowed; }

    .btn-resend:focus-visible {
      outline: 2px solid var(--gold);
      outline-offset: 2px;
    }

    /* ── Reduced motion ── */
    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        transition-duration: 0.01ms !important;
        animation-duration: 0.01ms !important;
      }
    }
  </style>
</head>
<body>

  <a href="/index.html" class="logo" aria-label="GrecoLatinoVivo — torna alla homepage">
    <span class="logo__mark">GrecoLatinoVivo</span>
    <span class="logo__sub">Centro Nazionale di Studi Classici</span>
  </a>

  <!-- ── Sezione principale: form imposta password ── -->
  <main id="main-content" class="card" aria-labelledby="page-title">
    <h1 class="card__title" id="page-title">Imposta la tua password</h1>
    <p class="card__desc">
      Scegli una password per accedere al tuo account GLV.
      Userai questa password ogni volta che vuoi accedere al portale.
    </p>

    <form id="set-pw-form" novalidate>
      <div class="field">
        <label for="pw-input">Nuova password</label>
        <div class="input-wrap">
          <input
            type="password"
            id="pw-input"
            name="password"
            required
            minlength="8"
            autocomplete="new-password"
            aria-describedby="strength-label"
            placeholder="Almeno 8 caratteri"
          >
          <button type="button" class="toggle-pw" aria-label="Mostra o nascondi la password" data-target="pw-input">👁</button>
        </div>
        <div class="strength-bar" aria-hidden="true">
          <div class="strength-bar__fill" id="strength-fill"></div>
        </div>
        <p class="strength-label" id="strength-label" aria-live="polite"></p>
      </div>

      <div class="field">
        <label for="pw-confirm">Conferma password</label>
        <div class="input-wrap">
          <input
            type="password"
            id="pw-confirm"
            name="confirmPassword"
            required
            autocomplete="new-password"
            placeholder="Ripeti la password"
          >
          <button type="button" class="toggle-pw" aria-label="Mostra o nascondi la conferma password" data-target="pw-confirm">👁</button>
        </div>
      </div>

      <button type="submit" class="btn-submit" id="submit-btn">Accedi al portale →</button>

      <p id="form-error" class="msg msg--error" role="alert" aria-live="assertive"></p>
      <p id="form-success" class="msg msg--success" role="status" aria-live="polite"></p>
    </form>

    <!-- Sezione reinvio link -->
    <div class="resend-section">
      <p class="resend-section__title">Link scaduto o non ricevuto?</p>
      <div class="resend-row">
        <input
          type="email"
          id="resend-email"
          placeholder="La tua email"
          autocomplete="email"
          aria-label="Email per reinviare il link"
        >
        <button type="button" class="btn-resend" id="resend-btn">Invia nuovo link</button>
      </div>
      <p id="resend-msg" class="msg" role="status" aria-live="polite"></p>
    </div>
  </main>

  <p class="foot">
    <a href="/index.html">← Torna alla homepage</a>
    &nbsp;·&nbsp;
    Hai già una password? Accedi dalla <a href="/dashboard.html">dashboard</a>.
  </p>

  <script>
    (function () {
      'use strict';

      // ── Leggi il token dall'URL ──────────────────────────────────────────
      const params = new URLSearchParams(window.location.search);
      const TOKEN  = (params.get('token') || '').trim();

      const form       = document.getElementById('set-pw-form');
      const submitBtn  = document.getElementById('submit-btn');
      const errorEl    = document.getElementById('form-error');
      const successEl  = document.getElementById('form-success');
      const pwInput    = document.getElementById('pw-input');
      const pwConfirm  = document.getElementById('pw-confirm');
      const strengthFill  = document.getElementById('strength-fill');
      const strengthLabel = document.getElementById('strength-label');

      // ── Toggle mostra/nascondi password ─────────────────────────────────
      document.querySelectorAll('.toggle-pw').forEach(btn => {
        btn.addEventListener('click', () => {
          const target = document.getElementById(btn.dataset.target);
          const shown  = target.type === 'text';
          target.type  = shown ? 'password' : 'text';
          btn.textContent = shown ? '👁' : '🙈';
          btn.setAttribute('aria-label', shown ? 'Mostra la password' : 'Nascondi la password');
        });
      });

      // ── Strength meter ───────────────────────────────────────────────────
      pwInput.addEventListener('input', () => {
        const val = pwInput.value;
        let score = 0;
        if (val.length >= 8)  score++;
        if (val.length >= 12) score++;
        if (/[A-Z]/.test(val)) score++;
        if (/[0-9]/.test(val)) score++;
        if (/[^A-Za-z0-9]/.test(val)) score++;

        const pct    = Math.min(100, score * 20);
        const colors = ['#a01a36','#c97a2a','#c9962a','#7ab045','#3db05b'];
        const labels = ['','Debole','Discreta','Buona','Forte','Ottima'];

        strengthFill.style.width = pct + '%';
        strengthFill.style.backgroundColor = colors[Math.max(0, score - 1)] || 'transparent';
        strengthLabel.textContent = score > 0 ? labels[score] : '';
      });

      // ── Se non c'è token, nascondi il form e mostra solo il resend ───────
      if (!TOKEN) {
        form.style.display = 'none';
        showError('Nessun token nel link. Inserisci la tua email qui sotto per riceverne uno nuovo.');
        document.getElementById('resend-email').focus();
      }

      // ── Submit form ──────────────────────────────────────────────────────
      form.addEventListener('submit', async e => {
        e.preventDefault();
        hideMessages();

        const password = pwInput.value;
        const confirm  = pwConfirm.value;

        if (password.length < 8) {
          return showError('La password deve essere di almeno 8 caratteri.');
        }
        if (password !== confirm) {
          return showError('Le due password non corrispondono.');
        }

        submitBtn.disabled    = true;
        submitBtn.textContent = 'Salvataggio…';

        try {
          const res = await fetch('/api/auth/set-password', {
            method:  'POST',
            headers: { 'Content-Type': 'application/json' },
            body:    JSON.stringify({ token: TOKEN, password }),
          });

          const data = await res.json();

          if (res.ok && data.ok) {
            showSuccess('Password impostata! Accesso al portale in corso…');
            submitBtn.textContent = '✓ Fatto';
            // Redirect dopo un breve attimo per far leggere il messaggio
            setTimeout(() => { window.location.href = '/dashboard.html'; }, 1200);
          } else {
            showError(data.error || 'Errore. Riprova.');
            submitBtn.disabled    = false;
            submitBtn.textContent = 'Accedi al portale →';
          }
        } catch (err) {
          showError('Errore di rete. Riprova tra qualche secondo.');
          submitBtn.disabled    = false;
          submitBtn.textContent = 'Accedi al portale →';
        }
      });

      // ── Reinvio link ─────────────────────────────────────────────────────
      document.getElementById('resend-btn').addEventListener('click', async () => {
        const emailVal = document.getElementById('resend-email').value.trim();
        const resendMsg = document.getElementById('resend-msg');
        const resendBtn = document.getElementById('resend-btn');

        if (!emailVal) {
          resendMsg.textContent = 'Inserisci la tua email.';
          resendMsg.className   = 'msg msg--error';
          resendMsg.style.display = 'block';
          return;
        }

        resendBtn.disabled    = true;
        resendBtn.textContent = 'Invio…';

        try {
          await fetch('/api/auth/resend-set-password', {
            method:  'POST',
            headers: { 'Content-Type': 'application/json' },
            body:    JSON.stringify({ email: emailVal }),
          });
        } catch { /* ignora errori di rete — messaggio generico comunque */ }

        resendMsg.textContent   = 'Se l\'email è associata a un abbonamento attivo, riceverai il link a breve.';
        resendMsg.className     = 'msg msg--success';
        resendMsg.style.display = 'block';
        resendBtn.textContent   = '✓ Inviato';
        // Ri-abilita dopo 30 secondi per evitare spam
        setTimeout(() => { resendBtn.disabled = false; resendBtn.textContent = 'Invia nuovo link'; }, 30000);
      });

      // ── Helpers ──────────────────────────────────────────────────────────
      function showError(msg) {
        errorEl.textContent    = msg;
        errorEl.style.display  = 'block';
      }
      function showSuccess(msg) {
        successEl.textContent   = msg;
        successEl.style.display = 'block';
      }
      function hideMessages() {
        errorEl.style.display   = 'none';
        successEl.style.display = 'none';
      }
    })();
  </script>

</body>
</html>
