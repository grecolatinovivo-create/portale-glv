<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Verifica Attestato — GrecoLatinoVivo</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800&family=Roboto:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --accent: #a01a36;
      --gold: #c9a84c;
      --gold-light: #e8d5a0;
      --bg: #f4f4f4;
      --text: #1a1a1a;
      --muted: #666;
      --border: #e0e0e0;
    }
    body {
      font-family: 'Roboto', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }
    /* ── NAV ─────────────────────────────────────────────────── */
    .glv-nav {
      background: #0d0d0d;
      padding: 0 40px;
      height: 60px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .nav-logo {
      font-family: 'Montserrat', sans-serif;
      font-weight: 800;
      font-size: 16px;
      color: #fff;
      text-decoration: none;
      letter-spacing: 1px;
    }
    .nav-logo span { color: var(--gold); }
    /* ── HERO ────────────────────────────────────────────────── */
    .hero {
      background: linear-gradient(135deg, #0d0d0d 0%, #1a1a1a 100%);
      padding: 60px 20px 40px;
      text-align: center;
    }
    .hero h1 {
      font-family: 'Montserrat', sans-serif;
      font-size: 28px;
      font-weight: 800;
      color: #fff;
      margin-bottom: 8px;
      letter-spacing: 1px;
    }
    .hero p { color: #888; font-size: 14px; }
    /* ── FORM ────────────────────────────────────────────────── */
    .verify-box {
      max-width: 560px;
      margin: -24px auto 40px;
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 8px 32px rgba(0,0,0,.10);
      padding: 40px;
    }
    .input-row {
      display: flex;
      gap: 12px;
      margin-bottom: 20px;
    }
    .verify-input {
      flex: 1;
      padding: 14px 16px;
      border: 1.5px solid var(--border);
      border-radius: 6px;
      font-family: 'Roboto', sans-serif;
      font-size: 15px;
      letter-spacing: 1px;
      text-transform: uppercase;
      outline: none;
      transition: border-color .2s;
    }
    .verify-input:focus { border-color: var(--accent); }
    .btn-verify {
      padding: 14px 28px;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 6px;
      font-family: 'Montserrat', sans-serif;
      font-weight: 700;
      font-size: 13px;
      letter-spacing: 1px;
      cursor: pointer;
      text-transform: uppercase;
      transition: background .2s;
      white-space: nowrap;
    }
    .btn-verify:hover { background: #7b0d1e; }
    .hint {
      font-size: 12px;
      color: var(--muted);
      text-align: center;
    }
    /* ── RISULTATO ────────────────────────────────────────────── */
    #result { margin-top: 20px; }
    .result-card {
      border-radius: 10px;
      padding: 28px 32px;
      border: 1.5px solid;
    }
    .result-valid {
      background: #f0fff4;
      border-color: #34c759;
    }
    .result-invalid {
      background: #fff5f5;
      border-color: #ff3b30;
    }
    .result-header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 20px;
    }
    .result-icon {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
      flex-shrink: 0;
    }
    .icon-valid   { background: #34c759; color: #fff; }
    .icon-invalid { background: #ff3b30; color: #fff; }
    .result-title { font-family: 'Montserrat', sans-serif; font-weight: 700; font-size: 18px; }
    .result-sub   { font-size: 13px; color: var(--muted); margin-top: 2px; }
    .result-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
      margin-bottom: 12px;
    }
    .result-field label {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: .8px;
      color: var(--muted);
      font-weight: 600;
      display: block;
      margin-bottom: 4px;
    }
    .result-field p {
      font-weight: 600;
      font-size: 14px;
    }
    .cert-code-display {
      background: #f4f4f4;
      padding: 10px 16px;
      border-radius: 6px;
      font-family: monospace;
      font-size: 16px;
      letter-spacing: 2px;
      font-weight: 700;
      color: var(--accent);
      display: inline-block;
      margin-top: 12px;
    }
    /* ── FOOTER ──────────────────────────────────────────────── */
    footer {
      margin-top: auto;
      background: #0d0d0d;
      padding: 24px 40px;
      text-align: center;
      color: #555;
      font-size: 12px;
    }
    footer a { color: #888; text-decoration: none; }
    .loading { text-align: center; color: var(--muted); padding: 20px; }
  </style>
</head>
<body>

  <!-- ── NAV ────────────────────────────────────────────────── -->
  <nav class="glv-nav">
    <a href="/" class="nav-logo">GRECO<span>LATINOVIVO</span></a>
    <a href="/" style="color:#888;font-size:13px;text-decoration:none;">← Portale</a>
  </nav>

  <!-- ── HERO ───────────────────────────────────────────────── -->
  <div class="hero">
    <h1>Verifica Attestato</h1>
    <p>Inserisci il codice attestato per verificarne l'autenticità</p>
  </div>

  <!-- ── FORM ───────────────────────────────────────────────── -->
  <div class="verify-box">
    <form id="verify-form" onsubmit="return false;">
      <div class="input-row">
        <input
          type="text"
          id="cert-input"
          class="verify-input"
          placeholder="GLV-2025-XXXXXXXX"
          maxlength="20"
          autocomplete="off"
          spellcheck="false"
        />
        <button type="button" class="btn-verify" onclick="verifyCert()">Verifica</button>
      </div>
      <p class="hint">Il codice si trova in basso a destra sull'attestato, sotto il QR code.</p>
    </form>
    <div id="result"></div>
  </div>

  <!-- ── FOOTER ─────────────────────────────────────────────── -->
  <footer>
    <p>GrecoLatinoVivo — Centro Nazionale di Studi Classici</p>
    <p style="margin-top:6px;"><a href="/">portale.grecolatinovivo.it</a></p>
  </footer>

  <script>
    // Controlla se c'è un codice nell'URL (es. /verifica.html?code=GLV-2025-...)
    (function () {
      var params = new URLSearchParams(window.location.search);
      var code = params.get('code') || params.get('certCode');
      if (code) {
        document.getElementById('cert-input').value = code.toUpperCase();
        verifyCert();
      }
    })();

    function verifyCert() {
      var code = document.getElementById('cert-input').value.trim().toUpperCase();
      if (!code) return;

      var resultEl = document.getElementById('result');
      resultEl.innerHTML = '<p class="loading">Verifica in corso…</p>';

      fetch('/api/verify/' + encodeURIComponent(code))
        .then(function(r) { return r.json(); })
        .then(function(data) {
          if (data.valid) {
            var issued = data.issuedAt
              ? new Date(data.issuedAt).toLocaleDateString('it-IT', { day:'numeric', month:'long', year:'numeric' })
              : '—';
            resultEl.innerHTML =
              '<div class="result-card result-valid">' +
                '<div class="result-header">' +
                  '<div class="result-icon icon-valid">✓</div>' +
                  '<div>' +
                    '<div class="result-title">Attestato autentico</div>' +
                    '<div class="result-sub">Emesso da GrecoLatinoVivo</div>' +
                  '</div>' +
                '</div>' +
                '<div class="result-row">' +
                  '<div class="result-field"><label>Studente</label><p>' + esc(data.studentName) + '</p></div>' +
                  '<div class="result-field"><label>Data emissione</label><p>' + issued + '</p></div>' +
                '</div>' +
                '<div class="result-row">' +
                  '<div class="result-field"><label>Corso</label><p>' + esc(data.courseTitle) + '</p></div>' +
                  '<div class="result-field"><label>Lingua · Livello</label><p>' + esc([data.courseLang, data.courseLevel].filter(Boolean).join(' · ')) + '</p></div>' +
                '</div>' +
                '<div class="cert-code-display">' + esc(data.certCode) + '</div>' +
              '</div>';
          } else {
            var msg = data.revoked
              ? 'Questo attestato è stato revocato il ' + new Date(data.revokedAt).toLocaleDateString('it-IT') + '.'
              : (data.error || 'Codice non trovato. Controlla di averlo inserito correttamente.');
            resultEl.innerHTML =
              '<div class="result-card result-invalid">' +
                '<div class="result-header">' +
                  '<div class="result-icon icon-invalid">✕</div>' +
                  '<div>' +
                    '<div class="result-title">' + (data.revoked ? 'Attestato revocato' : 'Attestato non trovato') + '</div>' +
                    '<div class="result-sub">' + esc(msg) + '</div>' +
                  '</div>' +
                '</div>' +
              '</div>';
          }
        })
        .catch(function() {
          resultEl.innerHTML =
            '<div class="result-card result-invalid">' +
              '<div class="result-header">' +
                '<div class="result-icon icon-invalid">!</div>' +
                '<div><div class="result-title">Errore di rete</div><div class="result-sub">Riprova tra qualche istante.</div></div>' +
              '</div>' +
            '</div>';
        });
    }

    function esc(str) {
      if (!str) return '';
      return String(str)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;');
    }

    // Invio con Enter
    document.getElementById('cert-input').addEventListener('keydown', function(e) {
      if (e.key === 'Enter') verifyCert();
    });
  </script>
</body>
</html>
