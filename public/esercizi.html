<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Esercizi — GrecoLatinoVivo</title>
<style>
  :root { --bordeaux:#a01a36; --gold:#c9a84c; }
  * { box-sizing:border-box; margin:0; padding:0; }
  body { font-family:'Inter',-apple-system,system-ui,sans-serif; background:#0d0d0d; color:#f5f5f5; min-height:100vh; }
  .topbar { display:flex; align-items:center; justify-content:space-between; padding:18px 28px; border-bottom:1px solid rgba(255,255,255,.08); }
  .brand { font-family:'Cormorant Garamond',serif; font-size:22px; color:#fff; text-decoration:none; }
  .brand small { display:block; font-size:11px; color:rgba(245,245,245,.55); letter-spacing:.05em; }
  .back { color:var(--gold); text-decoration:none; font-size:13px; }
  .wrap { max-width:820px; margin:0 auto; padding:40px 24px; }
  h1 { font-family:'Cormorant Garamond',serif; font-size:32px; color:#fff; margin-bottom:6px; }
  .sub { color:rgba(245,245,245,.6); margin-bottom:26px; font-size:14px; }
  .card { background:#161616; border:1px solid rgba(255,255,255,.09); border-radius:12px; padding:18px 20px; margin-bottom:12px; display:flex; justify-content:space-between; align-items:center; gap:12px; flex-wrap:wrap; }
  .card .title { font-size:16px; color:#fff; }
  .card .meta { color:rgba(245,245,245,.5); font-size:13px; }
  .btn { border:none; border-radius:7px; padding:9px 18px; font-size:13px; font-weight:700; cursor:pointer; background:var(--bordeaux); color:#fff; }
  .filterbar { display:flex; gap:8px; margin-bottom:18px; flex-wrap:wrap; }
  select, input { background:#0d0d0d; border:1px solid rgba(255,255,255,.15); border-radius:7px; color:#f5f5f5; padding:8px 11px; font-size:13px; }
  .empty,.err,.gate { text-align:center; padding:60px 20px; color:rgba(245,245,245,.5); }
  .gate a { color:var(--gold); }
  /* runner */
  #runner { display:none; }
  .q { background:#161616; border:1px solid rgba(255,255,255,.09); border-radius:12px; padding:20px; margin-bottom:14px; }
  .q-text { font-size:16px; color:#fff; margin-bottom:14px; line-height:1.5; }
  .opt { display:block; background:#0d0d0d; border:1px solid rgba(255,255,255,.14); border-radius:8px; padding:11px 14px; margin-bottom:8px; cursor:pointer; font-size:14px; }
  .opt.sel { border-color:var(--gold); background:rgba(201,168,76,.08); }
  .result { text-align:center; padding:24px; font-size:18px; color:#86efac; }
</style>
</head>
<body>
  <div class="topbar">
    <a href="/dashboard.html" class="brand">GrecoLatinoVivo<small>Esercizi</small></a>
    <a href="/dashboard.html" class="back">← Torna al portale</a>
  </div>
  <div class="wrap" id="wrap"><div class="empty">Caricamento…</div></div>

<script>
function esc(s){return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
let TESTS = [];

async function init() {
  const me = await fetch('/api/auth/me'); if (!me.ok) { location.href='/index.html'; return; }
  const r = await fetch('/api/exercises/library');
  const wrap = document.getElementById('wrap');
  if (r.status === 403) {
    wrap.innerHTML = '<div class="gate"><p>Gli esercizi sono riservati ai docenti con piano <strong>annuale Accademia</strong>.</p><p style="margin-top:12px;"><a href="/index.html#prezzi">Scopri i piani →</a></p></div>';
    return;
  }
  const d = await r.json();
  TESTS = d.tests || [];
  renderList();
}

function renderList() {
  const wrap = document.getElementById('wrap');
  let html = '<h1>Esercizi</h1><p class="sub">Sfoglia e prova i test autocorrettivi. Quelli che vedi qui sono assegnabili alle tue classi.</p>';
  // filtri lingua
  const lingue = [...new Set(TESTS.map(t=>t.lingua).filter(Boolean))];
  html += '<div class="filterbar"><select id="f-lingua" onchange="renderList()"><option value="">Tutte le lingue</option>';
  lingue.forEach(l => html += '<option value="'+esc(l)+'">'+esc(l)+'</option>');
  html += '</select><input type="text" id="f-search" placeholder="Cerca…" oninput="renderList()" value="'+(document.getElementById('f-search')?.value||'')+'"/></div>';
  html += '<div id="list"></div><div id="runner"></div>';
  wrap.innerHTML = html;
  // ripristina filtro lingua selezionato
  drawFiltered();
}

function drawFiltered() {
  const lg = document.getElementById('f-lingua')?.value || '';
  const q = (document.getElementById('f-search')?.value || '').toLowerCase();
  const list = document.getElementById('list');
  const filtered = TESTS.filter(t => (!lg || t.lingua===lg) && (!q || (t.title||'').toLowerCase().includes(q)));
  if (!filtered.length) { list.innerHTML = '<div class="empty">Nessun esercizio disponibile.</div>'; return; }
  list.innerHTML = filtered.map(t =>
    '<div class="card"><div><div class="title">'+esc(t.title)+'</div><div class="meta">'+esc(t.lingua||'')+' '+esc(t.livello||'')+'</div></div>'+
    '<button class="btn" onclick="tryTest(\''+t.id+'\')">Prova</button></div>'
  ).join('');
}

const _ans = {};
async function tryTest(testId) {
  const runner = document.getElementById('runner');
  runner.style.display='block'; runner.innerHTML='<div class="empty">Caricamento…</div>'; runner.scrollIntoView({behavior:'smooth'});
  const r = await fetch('/api/exercises/preview?testId='+testId);
  const d = await r.json();
  if (!r.ok) { runner.innerHTML='<div class="err">'+esc(d.error||'Errore')+'</div>'; return; }
  for (const k in _ans) delete _ans[k];
  const test = d.test;
  const qs = (test.sections||[]).flatMap(s=>s.questions||[]);
  let html = '<h2 style="font-family:Cormorant Garamond,serif;font-size:24px;color:#fff;margin:24px 0 14px;">'+esc(test.title)+' <span style="font-size:13px;color:#c9962a;">(modalità prova)</span></h2>';
  qs.forEach((q,i) => {
    html += '<div class="q"><div class="q-text">'+(i+1)+'. '+esc(q.instruction||q.title||'')+'</div>';
    let opts=[];
    try { const data = typeof q.data==='string'?JSON.parse(q.data):q.data;
      if (q.questionType==='VeroFalso') opts=['Vero','Falso'];
      else if (q.questionType==='SceltaMultipla' && Array.isArray(data)) { const it=data[0]||{}; opts=[it.correct,it.wrong_1,it.wrong_2,it.wrong_3].filter(Boolean); }
    } catch(_){}
    if (opts.length) opts.forEach((o,oi)=> html += '<label class="opt" onclick="pick(\''+q.id+'\','+oi+',this)">'+esc(o)+'</label>');
    else html += '<input type="text" style="width:100%;background:#0d0d0d;border:1px solid rgba(255,255,255,.15);border-radius:8px;color:#fff;padding:10px;" oninput="_ans[\''+q.id+'\']=this.value" placeholder="Risposta"/>';
    html += '</div>';
  });
  html += '<button class="btn" style="width:100%;margin-top:8px;" onclick="checkTest(\''+testId+'\')">Verifica risposte</button>';
  runner.innerHTML = html;
}
function pick(qid,oi,el){ _ans[qid]=oi; el.parentElement.querySelectorAll('.opt').forEach(o=>o.classList.remove('sel')); el.classList.add('sel'); }
async function checkTest(testId) {
  const answers = Object.entries(_ans).map(([questionId,given])=>({questionId,given}));
  const r = await fetch('/api/exercises/preview',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({testId,answers})});
  const d = await r.json();
  if (!r.ok) { alert(d.error||'Errore'); return; }
  document.getElementById('runner').innerHTML = '<div class="result">Punteggio prova: '+d.score+'/100</div><button class="btn" style="display:block;margin:0 auto;" onclick="document.getElementById(\'runner\').style.display=\'none\'">Chiudi</button>';
}
init();
</script>
</body>
</html>
