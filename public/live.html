<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Live mensili — GrecoLatinoVivo</title>
<style>
  :root { --bordeaux:#a01a36; --gold:#c9a84c; }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Inter', -apple-system, system-ui, sans-serif; background:#0d0d0d; color:#f5f5f5; min-height:100vh; }
  .topbar { display:flex; align-items:center; justify-content:space-between; padding:18px 28px; border-bottom:1px solid rgba(255,255,255,.08); }
  .brand { font-family:'Cormorant Garamond',serif; font-size:22px; color:#fff; text-decoration:none; }
  .brand small { display:block; font-size:11px; color:rgba(245,245,245,.55); letter-spacing:.05em; }
  .back { color:var(--gold); text-decoration:none; font-size:13px; }
  .wrap { max-width:860px; margin:0 auto; padding:40px 24px; }
  h1 { font-family:'Cormorant Garamond',serif; font-size:34px; color:#fff; margin-bottom:6px; }
  .subtitle { color:rgba(245,245,245,.6); margin-bottom:32px; font-size:14px; }
  .card { background:#161616; border:1px solid rgba(255,255,255,.09); border-radius:12px; padding:22px; margin-bottom:16px; }
  .card-head { display:flex; justify-content:space-between; align-items:flex-start; gap:16px; flex-wrap:wrap; }
  .card-title { font-size:18px; color:#fff; margin-bottom:4px; }
  .card-meta { color:var(--gold); font-size:14px; margin-bottom:2px; }
  .card-sub { color:rgba(245,245,245,.55); font-size:13px; }
  .btn { border:none; border-radius:6px; padding:10px 20px; font-size:13px; font-weight:700; cursor:pointer; letter-spacing:.04em; text-decoration:none; display:inline-block; }
  .btn-book { background:var(--bordeaux); color:#fff; }
  .btn-cancel { background:rgba(255,255,255,.08); color:#f5f5f5; }
  .btn-join { background:#16a34a; color:#fff; }
  .btn:disabled { opacity:.5; cursor:not-allowed; }
  .badge-booked { background:rgba(22,163,74,.18); color:#34d399; padding:4px 10px; border-radius:20px; font-size:12px; font-weight:700; }
  .empty, .gate { text-align:center; padding:60px 20px; color:rgba(245,245,245,.5); }
  .gate a { color:var(--gold); }
  .toast { position:fixed; bottom:24px; left:50%; transform:translateX(-50%); background:#222; border:1px solid rgba(255,255,255,.15); padding:12px 20px; border-radius:8px; font-size:14px; opacity:0; transition:opacity .3s; }
  .toast.show { opacity:1; }
</style>
</head>
<body>
  <div class="topbar">
    <a href="/dashboard.html" class="brand">GrecoLatinoVivo<small>Live mensili</small></a>
    <a href="/dashboard.html" class="back">← Torna al portale</a>
  </div>
  <div class="wrap">
    <h1>Live mensili</h1>
    <p class="subtitle">Incontri in diretta con i docenti · prenota il tuo posto</p>
    <div id="content"><div class="empty">Caricamento…</div></div>
  </div>
  <div class="toast" id="toast"></div>

<script>
function fmtDT(d) {
  try { return new Date(d).toLocaleString('it-IT', { dateStyle:'full', timeStyle:'short' }); }
  catch { return String(d); }
}
function showToast(msg) {
  const t = document.getElementById('toast'); t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3000);
}

async function load() {
  const content = document.getElementById('content');
  try { const r = await fetch('/api/auth/me'); if (!r.ok) { location.href = '/index.html'; return; } }
  catch { location.href = '/index.html'; return; }

  try {
    const r = await fetch('/api/lives');
    if (r.status === 403) {
      content.innerHTML = '<div class="gate"><p>Le live mensili sono riservate al piano <strong>annuale Accademia</strong>.</p><p style="margin-top:12px;"><a href="/index.html#prezzi">Scopri i piani →</a></p></div>';
      return;
    }
    if (!r.ok) { content.innerHTML = '<div class="empty">Errore nel caricamento.</div>'; return; }
    const { lives } = await r.json();
    if (!lives || !lives.length) {
      content.innerHTML = '<div class="empty">Nessuna live programmata al momento. Torna a controllare presto.</div>';
      return;
    }
    content.innerHTML = '';
    lives.forEach(l => {
      const card = document.createElement('div');
      card.className = 'card';
      card.innerHTML =
        '<div class="card-head">' +
          '<div>' +
            '<div class="card-title">' + esc(l.title) + '</div>' +
            '<div class="card-meta">' + fmtDT(l.startAt) + '</div>' +
            (l.description ? '<div class="card-sub">' + esc(l.description) + '</div>' : '') +
          '</div>' +
          '<div id="action-' + l.id + '"></div>' +
        '</div>';
      content.appendChild(card);
      renderAction(l);
    });
  } catch (e) {
    content.innerHTML = '<div class="empty">Errore di rete.</div>';
  }
}

function renderAction(l) {
  const el = document.getElementById('action-' + l.id);
  if (l.accessOpen && l.zoomLink) {
    // diretta in corso/imminente: link attivo
    el.innerHTML = '<a class="btn btn-join" href="' + esc(l.zoomLink) + '" target="_blank" rel="noopener">▶ Partecipa alla diretta</a>';
    return;
  }
  if (l.booked) {
    el.innerHTML = '<span class="badge-booked">✓ Prenotato</span><br><button class="btn btn-cancel" style="margin-top:8px;" onclick="cancelBooking(\'' + l.id + '\')">Annulla</button>';
  } else {
    el.innerHTML = '<button class="btn btn-book" onclick="book(\'' + l.id + '\')">Prenota il posto</button>';
  }
}

async function book(sessionId) {
  try {
    const r = await fetch('/api/lives', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ sessionId }) });
    const d = await r.json();
    if (!r.ok) { showToast(d.error || 'Errore'); return; }
    showToast('Posto prenotato! Riceverai i promemoria via email.');
    load();
  } catch { showToast('Errore di rete'); }
}
async function cancelBooking(sessionId) {
  if (!confirm('Annullare la prenotazione?')) return;
  try {
    const r = await fetch('/api/lives', { method:'DELETE', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ sessionId }) });
    if (!r.ok) { showToast('Errore'); return; }
    showToast('Prenotazione annullata');
    load();
  } catch { showToast('Errore di rete'); }
}
function esc(s){return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
load();
</script>
</body>
</html>
